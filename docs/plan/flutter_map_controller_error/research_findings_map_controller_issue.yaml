    - component: FlutterMap widget
      responsibility: |
        Third-party widget from flutter_map package that renders interactive map.
        Requires MapController to be bound before it mounts.
        Only rendered in _buildMapHome when showMapView is true.
      location: rider_home_screen.dart line 735
      relationship_to_domain: MapController targets this widget which isn't ready at listener execution time

  interfaces_used_by_domain:
    - interface: MapController (from flutter_map)
      location: rider_home_screen.dart line 42
      usage_pattern: |
        Created as instance variable.
        Passed to FlutterMap widget at line 735.
        Used to programmatically move map: _mapController.move(LatLng, double).
        No ready/mounted check before use - assumes widget is mounted.

    - interface: ref.listen from Riverpod
      location: rider_home_screen.dart lines 199-213
      usage_pattern: |
        Watches state changes and executes callback synchronously.
        Uses callback to trigger _mapController.move() on certain state conditions.
        No built-in timing control for widget readiness.

    - interface: LocationPermissionState enum
      location: rider_home_view_model.dart
      usage_pattern: |
        6 states: unknown, acquiring, ready, deniedSoft, deniedHard, serviceDisabled.
        Listener checks if state == ready before accessing MapController.
        Good practice but insufficient - ready location state ≠ map widget mounted.

