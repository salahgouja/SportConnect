        type: variable
        location: line 42
        description: |
          Final MapController initialized at class level before build() is called.
          Created eagerly as instance variable in _RiderHomeScreenState.
      - element: State listener for auto-follow
        type: pattern
        location: lines 206-213
        description: |
          Listener watches riderHomeViewModelProvider state changes.
          When locationState is ready AND showMapView is true AND isFollowingUser is true AND currentLocation exists,
          it calls _mapController.move(next.currentLocation!, next.currentZoom).
          NO ERROR HANDLING - directly calls move() without try-catch or guards.
      - element: Build method - main switch
        type: pattern
        location: lines 217-220
        description: |
          switch (locationState) with 5 cases.
          For LocationPermissionState.ready, returns showMapView ? _buildMapHome(vmState) : _buildFeedHome(vmState).
          Switches between feed view (default) and full map view based on showMapView boolean.
      - element: _buildMapHome method
        type: method
        location: lines 704-800+
        description: |
          Builds Stack with FlutterMap widget.
          Creates FlutterMap with mapController: _mapController at line 735.
          Only rendered when showMapView is true AND locationState is ready.
      - element: Map control onTap handlers
        type: pattern
        location: lines 1290-1307
        description: |
          onTap for follow-location toggle button.
          Calls _mapController.move() at line 1302 after checking if newState.isFollowingUser && currentLocation != null.
          Has more guards than the listener (null check + condition).
    language: Dart
    lines: 1400+

  - file: lib/features/home/view_models/rider_home_view_model.dart
    path: rider_home_view_model.dart
    purpose: Riverpod-based state container for rider home screen, manages location, map settings, filters, and routes
    key_elements:
      - element: showMap() method
        type: method
        location: lines 474-476
        description: |
          void showMap() { state = state.copyWith(showMapView: true); }
          Simple setter that triggers rebuild and state listener.
          Called directly from _MapToggleCard.onTap in RiderHomeFeed.
      - element: RiderHomeState class
        type: class
        location: lines 30-150
        description: |
          Immutable state container with copyWith pattern.
          Contains showMapView boolean (default: false).
          Also contains locationState, currentLocation, userHeading, zoom, map style, filters, routes.
      - element: Location stream initialization
        type: method
        location: lines 253-310 (_startLocationStream)
        description: |
          Starts continuous GPS tracking with 20m distance filter.
          Updates currentLocation in state on position changes.
          May trigger listener if isFollowingUser and showMapView are true.
    language: Dart
    lines: 550+

  - file: lib/features/home/views/widgets/rider_home_feed.dart
    path: rider_home_feed.dart
    purpose: |
      Scrollable feed widget displayed when showMapView is false.
      Contains greeting, gamification strip, upcoming rides, quick actions, events, nearby rides feed,
      and the critical _MapToggleCard that triggers showMap().
    key_elements:
      - element: RiderHomeFeed widget
        type: widget
        location: lines 25-70
        description: |
          ConsumerWidget build method returns CustomScrollView with multiple slivers.
          Defines RiderHomeFeed.onSearchTap callback at line 27.
      - element: _MapToggleCard widget
        type: widget
        location: lines 1100-1200+ (approximately lines 1100-1127 mentioned in error)
        description: |
          StatelessWidget displaying call-to-action card.
          GestureDetector with onTap that calls onTap() callback (provided as constructor param).
          Calls HapticFeedback.mediumImpact() before onTap().
          onTap callback is: () => ref.read(riderHomeViewModelProvider.notifier).showMap()
          This directly triggers showMap() which sets showMapView: true.
      - element: _MapToggleCard onTap flow
        type: pattern
        location: around line 1126
        description: |
          User taps card → onTap() called → showMap() called → state.showMapView = true →
