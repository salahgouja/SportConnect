appId: com.sportconnect.sport_connect
---
# ============================================
# Validation: Signup Form Input Validation
# ============================================
# Tests all validation scenarios on registration
# Covers: empty fields, invalid email, password rules,
# password mismatch, name too short, terms unchecked
# ============================================

- launchApp:
    clearState: true
    label: Launch SportConnect fresh

# Navigate to signup
- extendedWaitUntil:
    visible: "Welcome Back"
    timeout: 10000
- tapOn:
    text: "Sign Up"
    label: Navigate to registration

# Verify on register screen
- assertVisible: "Create Account"

# Select Rider role
- runFlow:
    when:
      visible: "Find rides"
    commands:
      - tapOn: "Find rides"

# -----------------------------------------------
# Test 1: Submit with all fields empty
# -----------------------------------------------
- tapOn:
    text: "Create Account"
    label: Submit with all empty fields
- assertVisible: "Name is required"
- assertVisible: "Email is required"
- assertVisible: "Password is required"
- takeScreenshot: signup-validation-all-empty

# -----------------------------------------------
# Test 2: Name too short (1 character)
# -----------------------------------------------
- tapOn: "Enter your full name"
- inputText: "A"
- tapOn:
    text: "Create Account"
    label: Submit with name too short
- assertVisible: "Name must be at least 2 characters"
- takeScreenshot: signup-validation-short-name

# Clear name
- tapOn: "Enter your full name"
- eraseText:
    charactersToErase: 50

# -----------------------------------------------
# Test 3: Invalid email format
# -----------------------------------------------
- tapOn: "Enter your full name"
- inputText: "Test User"
- tapOn: "Enter your email"
- inputText: "invalid-email"
- tapOn:
    text: "Create Account"
    label: Submit with invalid email
- assertVisible: "Enter a valid email address"
- takeScreenshot: signup-validation-invalid-email

# Clear email
- tapOn: "Enter your email"
- eraseText:
    charactersToErase: 50

# -----------------------------------------------
# Test 4: Password too short
# -----------------------------------------------
- tapOn: "Enter your email"
- inputText: "newuser@test.com"
- tapOn: "Create a strong password"
- inputText: "12345"
- tapOn:
    text: "Create Account"
    label: Submit with short password
- assertVisible: "Password must be at least 6 characters"
- takeScreenshot: signup-validation-short-password

# Clear password
- tapOn: "Create a strong password"
- eraseText:
    charactersToErase: 50

# -----------------------------------------------
# Test 5: Password mismatch
# -----------------------------------------------
- tapOn: "Create a strong password"
- inputText: "SecurePass@123"
- tapOn: "Re-enter your password"
- inputText: "DifferentPass@456"
- tapOn:
    text: "Create Account"
    label: Submit with mismatched passwords
- assertVisible: "Passwords do not match"
- takeScreenshot: signup-validation-password-mismatch

# Clear confirm password
- tapOn: "Re-enter your password"
- eraseText:
    charactersToErase: 50

# -----------------------------------------------
# Test 6: Matching passwords but terms unchecked
# -----------------------------------------------
- tapOn: "Re-enter your password"
- inputText: "SecurePass@123"
- tapOn:
    text: "Create Account"
    label: Submit without accepting terms
- extendedWaitUntil:
    visible:
      text: "Please agree to the Terms of Service|Please agree to the"
    timeout: 5000
- takeScreenshot: signup-validation-terms-unchecked

# -----------------------------------------------
# Test 7: Email already in use
# -----------------------------------------------
- tapOn: "Enter your email"
- eraseText:
    charactersToErase: 50
- tapOn: "Enter your email"
- inputText: "testuser@sportconnect.com"
- tapOn: "I agree to the "
- tapOn:
    text: "Create Account"
    label: Submit with existing email
- extendedWaitUntil:
    visible:
      text: "Email already in use|An error occurred"
    timeout: 10000
- takeScreenshot: signup-validation-email-in-use

# -----------------------------------------------
# Test 8: Confirm password empty
# -----------------------------------------------
- tapOn: "Re-enter your password"
- eraseText:
    charactersToErase: 50
- tapOn:
    text: "Create Account"
    label: Submit without confirming password
- assertVisible: "Please confirm your password"
- takeScreenshot: signup-validation-confirm-empty

