appId: com.sportconnect.sport_connect
---
# ============================================
# Vehicles Journey: Manage Vehicles
# ============================================
# Tests vehicle management for drivers
# Journey: Profile -> My Vehicles -> Add/Edit Vehicle
# ============================================

# Login as driver
- runFlow: ../common/driver-login-helper.yaml

# Step 1: Navigate to Profile tab
- tapOn:
    text: Profile
    label: Switch to Profile tab

# Step 2: Navigate to My Vehicles
- scrollUntilVisible:
    element:
      text: "My Vehicles|Vehicles"
    direction: DOWN
    timeout: 5000

- runFlow:
    when:
      visible: "My Vehicles"
    commands:
      - tapOn:
          text: "My Vehicles"
          label: Open vehicles management

- runFlow:
    when:
      visible: "Vehicles"
    commands:
      - tapOn:
          text: "Vehicles"
          label: Open vehicles management

# Step 3: Wait for vehicles screen
- extendedWaitUntil:
    visible:
      text: "Vehicles|My Vehicles|Add Vehicle|No vehicles"
    timeout: 5000

- takeScreenshot: vehicles-screen

# Step 4: Check for vehicles or empty state
- runFlow:
    when:
      visible: "Add Vehicle"
    commands:
      - tapOn:
          text: "Add Vehicle"
          label: Open add vehicle form
      - takeScreenshot: vehicles-add-form

      # Fill vehicle details if form is visible
      - runFlow:
          when:
            visible: "Make"
          commands:
            - tapOn: "Make"
            - inputText: "Toyota"

      - runFlow:
          when:
            visible: "Model"
          commands:
            - tapOn: "Model"
            - inputText: "Corolla"

      - runFlow:
          when:
            visible: "Year"
          commands:
            - tapOn: "Year"
            - inputText: "2023"

      - runFlow:
          when:
            visible: "Color"
          commands:
            - tapOn: "Color"
            - inputText: "White"

      - runFlow:
          when:
            visible: "License Plate"
          commands:
            - tapOn: "License Plate"
            - inputText: "ABC-1234"

      - takeScreenshot: vehicles-form-filled

      # Go back without saving
      - back:
          label: Return to vehicles list

# Step 5: Check existing vehicle if present
- runFlow:
    when:
      visible: "Toyota"
    commands:
      - assertVisible: "Toyota"
      - takeScreenshot: vehicles-list-with-car

- back:
    label: Return to profile

- takeScreenshot: vehicles-complete
