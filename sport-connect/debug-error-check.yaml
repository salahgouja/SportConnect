appId: com.sportconnect.sport_connect
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Welcome Back"
    timeout: 15000

# Fill invalid credentials to test error handling
- tapOn: "Enter your email"
- inputText: "nonexistent@sportconnect.com"
- hideKeyboard
- tapOn: "Enter your password"
- inputText: "WrongPass123"
- hideKeyboard

# Submit
- tapOn: "Sign In"

# Wait for error response (Firebase auth typically takes 2-5 seconds)
- extendedWaitUntil:
    visible: "Sign in failed|Incorrect|No account|invalid"
    timeout: 10000
    optional: true
    label: Wait for error snackbar
- takeScreenshot: after-login-error

# Check various possible error texts
- assertVisible:
    text: "Sign in failed"
    optional: true
    label: Check generic error
- assertVisible:
    text: "Incorrect"
    optional: true
    label: Check incorrect password
- assertVisible:
    text: "No account"
    optional: true
    label: Check no account
- assertVisible:
    text: "invalid"
    optional: true
    label: Check invalid
- assertVisible:
    text: "try again"
    optional: true
    label: Check try again
