      purpose_in_domain: Persists ride status/ridePhase and booking lifecycle fields.
    - name: go_router
      purpose_in_domain: Role-specific navigation into active ride screens and lifecycle pages.
    - name: flutter_map
      purpose_in_domain: Active ride map rendering and route visualization.
