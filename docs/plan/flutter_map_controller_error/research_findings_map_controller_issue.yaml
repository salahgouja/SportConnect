    language: Dart
    lines: 1200+

patterns_found:
  - category: architecture
    pattern: State-driven view switching via boolean flag
    description: |
      showMapView boolean in RiderHomeState controls conditional rendering in build() switch statement.
      When false: renders feed view (RiderHomeFeed).
      When true: renders map view (_buildMapHome with FlutterMap).
      Problem: Listeners fire synchronously with state change, before widget tree rebuild completes.
    examples:
      - file: rider_home_screen.dart
        location: lines 217-220
        snippet: |
          LocationPermissionState.ready =>
            vmState.showMapView
              ? _buildMapHome(vmState)
              : _buildFeedHome(vmState),
      - file: rider_home_view_model.dart
        location: lines 474-476
        snippet: |
          void showMap() {
            state = state.copyWith(showMapView: true);
          }

  - category: error_handling
    pattern: Inconsistent MapController access protection
    description: |
      Two instances of _mapController.move() exist in codebase:
      Line 206 (listener): NO error handling, NO guards, NO null checks
      Line 1302 (follow button): HAS null check for currentLocation, but still NO try-catch
      Pattern inconsistency suggests oversight in critical path.
    examples:
      - file: rider_home_screen.dart
        location: line 206
        snippet: |
          _mapController.move(next.currentLocation!, next.currentZoom);
      - file: rider_home_screen.dart
        location: lines 1302-1304
        snippet: |
          if (newState.isFollowingUser && currentLocation != null) {
            _mapController.move(currentLocation, currentZoom);
          }

  - category: timing
    pattern: Synchronous listener execution before widget render
    description: |
      ref.listen() callback fires synchronously when watched state changes.
      State change triggers rebuild, but listener executes in same frame before build completes.
      FlutterMap widget only becomes available during build phase (line 735).
      Creating a race condition when showMapView changes from false to true.
    examples:
      - file: rider_home_screen.dart
        location: lines 199-213
        snippet: |
          ref.listen<RiderHomeState>(riderHomeViewModelProvider, (previous, next) {
            if (next.locationState == LocationPermissionState.ready &&
                next.showMapView &&
                next.isFollowingUser &&
                next.currentLocation != null) {
              final vm = ref.read(riderHomeViewModelProvider.notifier);
              if (vm.canMoveMap()) {
                _mapController.move(next.currentLocation!, next.currentZoom);
                vm.updateLastMapMoveTime(DateTime.now());
              }
            }
          });

  - category: naming
    pattern: Consistent method naming for state mutations
    description: |
      View model methods follow verb-first pattern: showMap(), showFeed(), toggleFollowingUser(), etc.
      Setter methods use imperative names indicating state mutation.
      Clear intent in method names aids code readability.
    examples:
      - file: rider_home_view_model.dart
        location: lines 470-480
        snippet: |
          void toggleMapView() { ... }
          void showMap() { state = state.copyWith(showMapView: true); }
          void showFeed() { state = state.copyWith(showMapView: false); }

  - category: structure
    pattern: Multi-layer state management with Riverpod notifiers
    description: |
      RiderHomeState encapsulates all immutable data.
      RiderHomeViewModel (Riverpod @riverpod) owns state mutations and business logic.
      UI widgets watch state via ref.watch() and call methods via ref.read().notifier.
      Unidirectional data flow but listener execution timing creates vulnerability.
    examples:
      - file: rider_home_view_model.dart
        location: class RiderHomeViewModel
        snippet: |
          @riverpod
          class RiderHomeViewModel extends _$RiderHomeViewModel {
            @override
            RiderHomeState build() { ... }
            
            void showMap() {
              state = state.copyWith(showMapView: true);
            }
          }

