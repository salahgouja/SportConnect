      integration_point: Route geometry and ETA updates in active/countdown flows.

related_conventions:
  naming_patterns_in_domain: Status enums use UpperCamelCase types with lowerCamelCase enum values; persisted phase values are lowerCamelCase strings (pickingUp/enRoute/arriving/completed).
  structure_of_domain: Repositories own persistence, services own side effects, viewmodels own state transitions, views trigger action methods and navigate.
  error_handling_in_domain: Transition methods catch and store actionError; several phase writes are unawaited fire-and-forget and do not surface persistence failures immediately.
  testing_in_domain: No dedicated transition test artifacts were inspected within this scope.
  documentation_in_domain: Inline comments explain transition intent, including single-source-of-truth notes around ridePhase derivation.

related_dependencies:
  internal:
    - component: rideStreamProvider / bookingsByRideProvider
      relationship_to_domain: Supplies live backend snapshots that drive phase derivation and navigation guards.
      direction: inbound
    - component: notificationRepositoryProvider
      relationship_to_domain: Used on status transition side effects (driver arrived, cancellation, completion).
      direction: outbound
    - component: profileRepositoryProvider / driverStatsRepositoryProvider
      relationship_to_domain: Completion and cancellation side-effect updates.
      direction: outbound
  external:
    - name: Firebase Firestore
      purpose_for_domain: Source of truth for status and ridePhase persistence.
    - name: go_router
      purpose_for_domain: Route binding for role-specific active ride flows.

domain_security_considerations:
  sensitive_areas:
    - area: Booking/ride update queries rely on scoped driverId/passengerId filters.
      location: lib/features/rides/repositories/ride_repository.dart
      concern: Incorrectly scoped queries can be blocked by Firestore rules or expose unauthorized lifecycle mutations.
  authentication_patterns_in_domain: Driver/passenger scoped reads and writes are routed through user-specific providers and repository query constraints.
  authorization_patterns_in_domain: Route selection is role-specific in route config, but a passenger detail CTA references a driver route name.
  data_validation_in_domain: startRide enforces at least one accepted booking; completeRide enforces inProgress state before completion.

testing_patterns:
  framework: flutter_test (not directly inspected in this audit scope)
  coverage_areas:
    - Transition guards for status-change-driven auto-navigation
    - Ride status and ridePhase write sequencing
  test_organization: No transition-focused tests were confirmed in inspected files.
  mock_patterns:
    - Not observed in the audited source subset

open_questions:
  - question: Is passenger access to AppRoutes.driverActiveRide blocked by router role guards, or can the passenger ride detail CTA invoke an invalid role screen?
    context: Passenger ride detail references AppRoutes.driverActiveRide.name at lib/features/rides/views/passenger/ride_detail_screen.dart:1807.
  - question: Are there backend/cloud-function paths that normalize ridePhase on cancellation to avoid stale phase values?
    context: Client cancellation paths set status cancelled but do not explicitly reset ridePhase in the service-layer cancellation write path.

gaps:
  - area: Backend mutation parity outside Flutter client
    description: Cloud Functions transition logic was not deeply audited in this task.
    impact: Some persisted status/phase writes may exist outside lib/ and are not included in this domain report.
  - area: Runtime verification
    description: No emulator/runtime execution was performed for transition race/failure scenarios.
    impact: Divergence risks are static-code-derived and not empirically validated under network failure conditions.
