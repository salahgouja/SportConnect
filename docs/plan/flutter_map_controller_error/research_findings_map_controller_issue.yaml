related_conventions:
  naming_patterns_in_domain: |
    Private variables: _mapController, _positionStreamSubscription (underscore prefix).
    Widget classes: PascalCase with "State" suffix for StatefulWidget states (e.g., _RiderHomeScreenState).
    Private widget classes: PascalCase with underscore prefix (e.g., _MapToggleCard, _buildMapHome).
    ViewModel methods: camelCase with action verbs (showMap(), toggleMapView(), resetLocation()).
    State enum values: camelCase in lowercase enums (LocationPermissionState.ready, .acquiring, etc.).

  structure_of_domain: |
    Separation into:
    - Views: rider_home_screen.dart (main container), rider_home_feed.dart (feed widget)
    - ViewModels: rider_home_view_model.dart (Riverpod notifier with all business logic)
    - Models: RiderHomeState (immutable state container), LocationPermissionState (enum)
    
    Flow: 
    Views → ViewModel (via ref.read().notifier) → State mutations → State listeners/watchers
    Listeners have direct access to widgets (mounted context) but not all requirements for third-party components.

  error_handling_in_domain: |
    Partial error handling exists:
    - _startLocationStream: try-catch around position acquisition (lines 253-310)
    - acquireLocationAndShowMap: try-catch on Geolocator.getCurrentPosition (lines 253-270)
    - _requestNotificationPermission: try-catch for Firebase messaging (rider_home_screen.dart lines 120-140)
    
    MISSING error handling:
    - _mapController.move() calls: NO try-catch (lines 206, 1302)
    - No guards checking if FlutterMap is mounted/ready before map manipulation
    - No graceful degradation if map operations fail

  testing_in_domain: |
    No specific test patterns identified in research scope.
    Would require:
    - Widget tests that verify state listener timing relative to widget build
    - Mock/spy on MapController to detect pre-render access
    - Verify FlutterMap is mounted before listener executes on map commands

  documentation_in_domain: |
    Code is well-structured with clear method names and variable semantics.
    But no inline documentation explaining the race condition or timing considerations.
    Comments note "Auto-follow map when location changes (only when map is visible)"
    but don't document synchronization pitfalls.

