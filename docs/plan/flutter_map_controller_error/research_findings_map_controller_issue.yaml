domain_security_considerations:
  sensitive_areas:
    - area: Location data exposure
      location: _startLocationStream() and ref.listen in rider_home_screen.dart
      concern: |
        User's real-time location is tracked continuously and broadcast via Riverpod state.
        Any listener to riderHomeViewModelProvider can access currentLocation LatLng.
        No encryption or privacy masking applied at state level.

    - area: Implicit widget tree state assumption
      location: Listener callback accessing MapController
      concern: |
        State listener assumes FlutterMap widget is mounted just because location state is ready.
        This assumption fails when state changes trigger listener before widget rebuild.
        Could potentially expose sensitive UI state if more critical operations were involved.

  data_validation_in_domain: |
    Location data:
    - GPS position filtered by 20m distance (prevents jitter, line 275)
    - Query anchor refreshed every 1km to keep Firestore queries efficient
    - Heading validated (headingDelta < 8 check, line 269)
    
    Map operations:
    - currentLocation and currentZoom null-checked at line 1303
    - Zoom bounds checked implicitly (MapOptions handles valid ranges)
    - No validation of LatLng validity before map operations

