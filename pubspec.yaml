name: sport_connect
description: "SportConnect - Social carpooling app for sports enthusiasts"
publish_to: "none"

version: 1.1.18

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # State Management (MVVM)
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Firebase Services
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  firebase_analytics: ^12.3.0
  firebase_crashlytics: ^5.2.0
  firebase_app_check: ^0.4.3
  firebase_database: ^12.3.0
  cloud_functions: ^6.2.0

  # Deep Linking & Notifications
  app_links: ^7.0.0
  flutter_local_notifications: ^21.0.0

  # Maps & Route Visualization
  flutter_map: ^8.2.2
  flutter_map_cache: ^2.1.0
  flutter_map_location_marker: ^10.2.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  map_launcher: ^4.4.3

  # Networking & HTTP
  dio: ^5.9.0

  # WebView
  flutter_inappwebview: ^6.1.5

  # Responsive Design
  responsive_framework: ^1.5.1
  device_info_plus: ^11.0.0

  # Navigation
  go_router: ^17.0.1

  # Local Storage
  shared_preferences: ^2.3.3

  # Payments (Stripe)
  flutter_stripe: ^12.6.0

  # Core Utilities
  intl: ^0.20.1
  image_picker: ^1.1.2
  uuid: ^4.5.1
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  crypto: ^3.0.7
  path_provider: ^2.1.5

  # Authentication
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1

  # App Features
  in_app_review: ^2.0.10
  in_app_purchase: ^3.2.3

  smooth_page_indicator: ^2.0.1
  emoji_picker_flutter: ^4.4.0

  # Essential Animations
  flutter_animate: ^4.5.2

  # UI Components
  wolt_modal_sheet: ^0.11.0
  skeletonizer: ^2.1.3
  sliver_tools: ^0.2.12

  # Secrets Management
  envied: ^1.3.3
  pdf: ^3.11.3
  printing: ^5.14.2
  flutter_svg: ^2.2.3

  reactive_forms: ^18.2.2
  upgrader: ^13.1.0
  adaptive_platform_ui: ^0.1.105
  geo_fence_utils: ^2.0.1
  dio_cache_interceptor: ^4.0.6
  http_cache_hive_store: ^5.1.0
  in_app_purchase_android: ^0.4.0+10
  reactive_cupertino_text_field: ^2.1.2
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  riverpod_generator: ^4.0.0
  riverpod_lint: ^3.1.0
  custom_lint: ^0.8.1
  riverpod_devtools_tracker: ^1.0.7

  # Secrets Management
  envied_generator: ^1.3.3

  # Testing
  mockito: ^5.4.4

  # Production UI
  flutter_launcher_icons: ^0.14.4
  talker_flutter: ^5.1.12
  talker_riverpod_logger: ^5.1.12
  talker_dio_logger: ^5.1.12

  # Development Tools
  very_good_analysis: ^10.2.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

# Flutter Native Splash Configuration
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#1A1A1A"
  image: assets/images/splash_logo.png
  image_dark: assets/images/splash_logo_dark.png
  fullscreen: true
  android_12:
    image: assets/images/splash_logo_android12.png
    image_dark: assets/images/splash_logo_android12_dark.png

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon_light.png"
  image_path_ios: "assets/icons/app_icon_light.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  adaptive_icon_foreground_inset: 16
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon_light.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
