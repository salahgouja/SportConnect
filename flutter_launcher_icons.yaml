# Flutter Launcher Icons Configuration
# Generates app icons for all platforms from a single source image
# Run: flutter pub run flutter_launcher_icons

flutter_launcher_icons:
  # Android app icon
  android: "launcher_icon"
  
  # iOS app icon
  ios: true
  
  # Web configuration
  web:
    generate: true
    theme_color: "#FFFFFF"
    background_color: "#FFFFFF"
  
  # Windows configuration
  windows:
    generate: true
    icon_size: 48  # Min: 48, Max: 256
  
  # macOS configuration
  macos:
    generate: true
  
  # Linux configuration
  linux:
    generate: true
  
  # Source image paths
  image_path: "assets/icons/app_icon.png"           # Main icon (1024x1024, should be square)
  image_path_ios: "assets/icons/app_icon_ios.png"   # iOS-specific icon (optional, 1024x1024)
  
  # iOS-specific options
  remove_alpha_ios: true                             # iOS doesn't support transparency in launcher icon
  
  # Android-specific option
  min_sdk_android: 21                                # Android minimum SDK version
  
  # Preserve old icons (set to false if you want to keep backups)
  preserve_old_icons: false
