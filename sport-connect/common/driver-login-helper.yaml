appId: com.sportconnect.sport_connect
---
# ============================================
# Common: Driver Login Helper Flow
# ============================================
# Reusable subflow to log in as a driver
# ============================================

- launchApp:
    clearState: true
    label: Launch app fresh

# Wait for splash to complete and login screen to appear
- extendedWaitUntil:
    visible: "Welcome Back"
    timeout: 10000

# Fill login form with driver credentials
- tapOn: "Enter your email"
- inputText: "testdriver@sportconnect.com"
- tapOn: "Enter your password"
- inputText: "Test@12345"
- tapOn: "Sign In"

# Wait for driver home screen
- extendedWaitUntil:
    visible: "Home"
    timeout: 15000
