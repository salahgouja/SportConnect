plan_id: fluttermap-mapcontroller-sync-listener-fix
objective: "Fix the FlutterMap MapController synchronous listener timing issue that causes 'You need to have the FlutterMap widget rendered at least once' error when toggling map view in rider home screen"
created_at: "2026-04-01T00:00:00Z"
created_by: "gem-planner"
status: pending_approval
research_confidence: high

tldr: |
  The issue occurs because the state listener in RiderHomeScreenState.build() (line 206) fires synchronously when showMapView state changes, attempting to call _mapController.move() before the FlutterMap widget renders. Fix requires: (1) defer listener execution to next frame using Future.microtask()/SchedulerBinding, (2) add _mapReady flag to track widget render completion, (3) add protective guards at both listener locations (lines 206 and 1302), (4) ensure no breaking changes to auto-follow and manual show-map flows.

open_questions:
  - Should we add logging for debugging map readiness state?
  - Do we need to handle rapid show/hide toggles (debouncing)?
  - Should the map readiness check extend to zoom operations?

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "MapController.move() called before FlutterMap widget is mounted, causing 'widget not rendered' error"
      likelihood: high
      impact: critical
      mitigation: "Add _mapReady flag set after first FlutterMap build, use Future.microtask() to defer listener execution"
    
    - scenario: "Auto-follow map functionality breaks when user scrolls and then follows again"
      likelihood: medium
      impact: high
      mitigation: "Ensure guards only prevent calls when map is not ready, not when following is disabled"
    
    - scenario: "Rapid toggle of map view leaves listener in inconsistent state"
      likelihood: low
      impact: medium
      mitigation: "Use proper state management guards with Riverpod's canMoveMap() pattern"
    
    - scenario: "Manual location button click doesn't move map the first time"
      likelihood: medium
      impact: high
      mitigation: "Implement fallback mechanism with scheduled retry or manual state check"

  assumptions:
    - "MapController is created once in _RiderHomeScreenState as widget-owned state"
    - "showMapView state change triggers rebuild that renders FlutterMap synchronously"
    - "_mapReady flag will be set during first build of FlutterMap widget"
    - "Riverpod ref.listen is the primary trigger for the error, not widget rebuilds"
    - "Follow-user flow is independent from show-map toggle and should work correctly"
    - "No hot reload or state preservation is needed across app restarts"

implementation_specification:
  code_structure: |
    Modifications are isolated to RiderHomeScreenState class in rider_home_screen.dart:
    1. Add _mapReady boolean flag (initially false)
    2. Wrap ref.listen listener callback with Future.microtask() to defer execution
    3. Add conditional guard: only execute _mapController.move() if _mapReady == true
    4. Set _mapReady = true via callback after FlutterMap widget builds (using postFrameCallback)
    5. Apply same guard pattern to follow-user location button handler
    6. Keep guards consistent: check both _mapReady and existing canMoveMap() logic

  affected_areas:
    - "lib/features/home/views/rider_home_screen.dart (RiderHomeScreenState class)"
    - "State listener callback: lines 190-213"
    - "Follow location button handler: lines 1295-1310"
    - "FlutterMap initialization: lines 720-750"

  component_details:
    - component: "MapControllerGuard (_mapReady flag)"
      responsibility: "Track whether FlutterMap widget has completed its first build and is safe to receive MapController commands"
      interfaces:
        - "_mapReady: bool (field flag, initially false)"
        - "setMapReady(): void (called via SchedulerBinding post-frame callback)"

    - component: "DeferredListenerExecution"
      responsibility: "Defer state listener callback to next frame to ensure FlutterMap is rendered before executing map operations"
      interfaces:
        - "ref.listen callback wrapped in Future.microtask() or SchedulerBinding.instance.addPostFrameCallback()"

    - component: "FollowLocationGuard"
      responsibility: "Add same protective pattern to manual follow-location click handler to prevent similar race condition"
      interfaces:
        - "Check _mapReady before calling _mapController.move()"

  dependencies:
    - component: "_mapReady flag"
      relationship: "Guards both listener callback and follow-location handler. Must be set before either can execute"
    
    - component: "FlutterMap widget"
      relationship: "FlutterMap completion triggers setMapReady() callback"
    
    - component: "State listener"
      relationship: "Must wrap callback execution to defer and check guard"

  integration_points:
    - "SchedulerBinding.instance.addPostFrameCallback() to set _mapReady after first frame"
    - "Future.microtask() or SchedulerBinding to defer listener execution"
    - "Existing Riverpod vm.canMoveMap() logic (no changes to ViewModel)"
    - "Follow-user toggle flip flow (no changes to ViewModel)"

