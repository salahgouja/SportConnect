<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportConnect - Open Ride</title>
  <!-- Open Graph tags for rich previews in WhatsApp/Messenger -->
  <meta property="og:title" content="SportConnect - Carpool Ride">
  <meta property="og:description" content="Check out this ride on SportConnect! Eco-friendly carpooling for sports enthusiasts.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="SportConnect">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #2D6A4F 0%, #40916C 50%, #52B788 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.18);
    }
    .logo {
      width: 72px; height: 72px;
      border-radius: 18px;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 36px;
    }
    .brand { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; margin-bottom: 4px; }
    h1 { font-size: 24px; margin-bottom: 8px; font-weight: 700; }
    p { font-size: 16px; opacity: 0.9; margin-bottom: 24px; }
    .ride-info {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px;
      font-size: 15px;
      opacity: 0.95;
      margin-bottom: 24px;
      line-height: 2;
      text-align: left;
    }
    .btn {
      display: inline-block;
      background: #fff;
      color: #2D6A4F;
      padding: 14px 40px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .btn:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(0,0,0,0.2); }
    .store-links { margin-top: 20px; }
    .store-links a {
      color: #fff;
      text-decoration: underline;
      font-size: 14px;
      opacity: 0.8;
    }
    .store-links a:hover { opacity: 1; }
    .spinner {
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid #fff;
      border-radius: 50%;
      width: 32px; height: 32px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .eco-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.2);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🚗</div>
    <div class="brand">SportConnect</div>
    <h1>Carpool Ride</h1>
    <div id="loading">
      <div class="spinner"></div>
      <p>Opening in the app...</p>
    </div>
    <div id="fallback" style="display: none;">
      <p>View this ride in SportConnect</p>
      <div class="ride-info" id="rideInfo"></div>
      <a class="btn" id="openApp" href="#">Open in App</a>
      <div class="store-links">
        <p style="margin-top: 20px; font-size: 13px;">
          Don't have the app?<br>
          <a href="https://play.google.com/store/apps/details?id=com.sportconnect.sport_connect">Get it on Google Play</a>
        </p>
      </div>
      <div class="eco-badge">🌱 Eco-friendly carpooling</div>
    </div>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var pathParts = window.location.pathname.split('/').filter(Boolean);
      var rideId = pathParts.length >= 2 ? pathParts[1] : null;

      // Update OG tags dynamically
      var from = params.get('from') || '';
      var to = params.get('to') || '';
      var price = params.get('price') || '';
      var seats = params.get('seats') || '';

      if (from && to) {
        var info = '📍 ' + from + ' → ' + to;
        if (price) info += '<br>💰 ' + price + ' € per seat';
        if (seats) info += '<br>🪑 ' + seats + ' seats available';
        document.getElementById('rideInfo').innerHTML = info;

        // Update page title for share previews
        document.title = 'SportConnect - ' + from + ' → ' + to;
      }

      var deepLink = 'sportconnect://ride/' + (rideId || '');
      document.getElementById('openApp').href = deepLink;

      var didOpen = false;
      window.addEventListener('blur', function() { didOpen = true; });

      var iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = deepLink;
      document.body.appendChild(iframe);

      setTimeout(function() {
        document.body.removeChild(iframe);
        if (!didOpen) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('fallback').style.display = 'block';
        }
      }, 2500);
    })();
  </script>
</body>
</html>
