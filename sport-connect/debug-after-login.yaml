appId: com.sportconnect.sport_connect
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Welcome Back"
    timeout: 15000

# Fill in form
- tapOn: "Enter your email"
- inputText: "testuser@sportconnect.com"
- hideKeyboard
- tapOn: "Enter your password"
- inputText: "Test@12345"
- hideKeyboard

# Submit
- tapOn: "Sign In"

# Wait and capture what appears
- waitForAnimationToEnd
- takeScreenshot: after-sign-in-1

# Wait a bit more
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000
    optional: true
- takeScreenshot: after-sign-in-2

# Check various possible outcomes
- assertVisible:
    text: "Where are you going?"
    optional: true
    label: Check home screen
- assertVisible:
    text: "error"
    optional: true
    label: Check error
- assertVisible:
    text: "Error"
    optional: true
    label: Check Error cap
- assertVisible:
    text: "invalid"
    optional: true
    label: Check invalid
- assertVisible:
    text: "Invalid"
    optional: true
    label: Check Invalid cap
- assertVisible:
    text: "wrong"
    optional: true
    label: Check wrong
- assertVisible:
    text: "incorrect"
    optional: true
    label: Check incorrect
- assertVisible:
    text: "failed"
    optional: true
    label: Check failed
- assertVisible:
    text: "Failed"
    optional: true
    label: Check Failed cap
- assertVisible:
    text: "No user"
    optional: true
    label: Check no user
- assertVisible:
    text: "not found"
    optional: true
    label: Check not found
- assertVisible:
    text: "Welcome Back"
    optional: true
    label: Check still on login
- assertVisible:
    text: "Sign In"
    optional: true
    label: Check Sign In still visible
- assertVisible:
    text: "Dashboard"
    optional: true
    label: Check dashboard
- assertVisible:
    text: "Home"
    optional: true
    label: Check home
- assertVisible:
    text: "role"
    optional: true
    label: Check role selection
- assertVisible:
    text: "Rider"
    optional: true
    label: Check rider
- assertVisible:
    text: "Driver"
    optional: true
    label: Check driver
- assertVisible:
    text: "Choose"
    optional: true
    label: Check choose
- assertVisible:
    text: "Select"
    optional: true
    label: Check Select
- assertVisible:
    text: "OK"
    optional: true
    label: Check OK
- assertVisible:
    text: "Try again"
    optional: true
    label: Check try again
