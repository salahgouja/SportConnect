appId: com.sportconnect.sport_connect
---
# ============================================
# Rides Journey: Driver - Manage Requests
# ============================================
# Tests the ride request management flow
# Journey: Home -> Requests -> Accept/Decline
# ============================================

# Login as driver
- runFlow: ../../common/driver-login-helper.yaml

# Step 1: Navigate to requests
- runFlow:
    when:
      visible: "Rides"
    commands:
      - tapOn:
          text: Rides
          label: Go to Rides/Schedule tab

- extendedWaitUntil:
    visible:
      text: "New Ride Request|No Pending Requests|Your Journey Timeline"
    timeout: 5000

- takeScreenshot: driver-manage-requests

# Step 2: Check for pending requests
- runFlow:
    when:
      visible: "New Ride Request"
    commands:
      # Verify request card elements
      - assertVisible: "New Ride Request"
      - assertVisible: "Pickup"
      - assertVisible: "Dropoff"
      - assertVisible: "Decline"
      - assertVisible: "Accept"
      - takeScreenshot: driver-request-card

      # Test accept action
      - tapOn:
          text: "Accept"
          label: Accept ride request
      - takeScreenshot: driver-request-accepted

# Step 3: Handle empty state
- runFlow:
    when:
      visible: "No Pending Requests"
    commands:
      - assertVisible: "No Pending Requests"
      - assertVisible: "You're all caught up!"
      - takeScreenshot: driver-no-pending-requests

# Step 4: Check journey timeline
- runFlow:
    when:
      visible: "Your Journey Timeline"
    commands:
      - assertVisible: "Your Journey Timeline"

- runFlow:
    when:
      visible: "No Upcoming Rides"
    commands:
      - assertVisible: "No Upcoming Rides"
      - assertVisible: "Start planning your journey"

- takeScreenshot: driver-manage-requests-complete
