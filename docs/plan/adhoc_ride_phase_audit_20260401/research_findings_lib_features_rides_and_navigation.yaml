plan_id: adhoc_ride_phase_audit_20260401
objective: Audit driver/rider active ride phase correctness and status transitions, including divergence risks between UI phase and persisted backend ride state.
focus_area: lib/features/rides and shared navigation entry points
created_at: 2026-04-01T00:00:00Z
created_by: gem-researcher
status: completed

tldr: |
  - Canonical persisted ride state is split into RideStatus (enum) and ridePhase (string), both stored on the ride document.
  - Persisted lifecycle writes are concentrated in RideRepository.startRide/completeRide/updateRidePhase and RideService.cancelRide.
  - Driver active flow uses optimistic local phase updates (enRoute/arriving) before fire-and-forget persistence, creating temporary or failure-path divergence risk.
  - Multiple shared navigation entry points route by RideStatus.inProgress; one passenger view routes to driver active route name.
  - RideStatus.full is heavily read in UI but no assignment site was found in audited Dart write paths.

research_metadata:
  methodology: Hybrid retrieval with file_search + grep_search + semantic_search for discovery, then targeted read_file inspection of lifecycle repositories, services, ride viewmodels, active ride screens, and shared routing/home entry points.
  scope: Deep read of ride status/phase mutation surfaces and status-driven navigation in lib/features/rides plus shared home/routes notification entry points.
  confidence: high
  coverage: 90

