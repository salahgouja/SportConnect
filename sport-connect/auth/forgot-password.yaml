appId: com.sportconnect.sport_connect
---
# ============================================
# Auth Journey: Forgot Password
# ============================================
# Tests the password reset flow
# Journey: Login -> Forgot Password -> Enter Email -> Success
# ============================================

- launchApp:
    clearState: true
    label: Launch SportConnect fresh

# Step 1: Verify login screen
- extendedWaitUntil:
    visible: "Welcome Back"
    timeout: 10000

# Step 2: Tap Forgot Password
- tapOn:
    text: "Forgot Password?"
    label: Navigate to forgot password

# Step 3: Verify forgot password screen/sheet
- assertVisible: "Reset Password"
- assertVisible: "Enter your email address and we'll send you instructions to reset your password."
- takeScreenshot: forgot-password-screen

# Step 4: Enter email
- tapOn:
    text: "Enter your email"
    index: 0
- inputText: "testuser@sportconnect.com"

# Step 5: Submit
- tapOn:
    text: "Send Reset Link"
    label: Send password reset email

# Step 6: Verify success
- extendedWaitUntil:
    visible: "Password reset email sent! Check your inbox."
    timeout: 10000

- takeScreenshot: forgot-password-success

# Step 7: Go back to login
- tapOn:
    text: "Back to Login"
    label: Return to login screen

# Step 8: Verify back on login
- assertVisible: "Welcome Back"
