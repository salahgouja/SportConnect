<!DOCTYPE html>
<!--

  Pure JavaScript WebRTC implementation for Flutter WebView
  Free for commercial use

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WebRTC Call</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #2D6A4F 0%, #40916C 50%, #52B788 100%); /* Light classy green gradient */
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    #container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    #remoteVideo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: linear-gradient(135deg, #2D6A4F 0%, #40916C 100%); /* Light green gradient */
    }
    
    #localVideo {
      position: absolute;
      top: 60px;
      right: 16px;
      width: 100px;
      height: 140px;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid rgba(149, 213, 178, 0.6); /* Light mint border */
      box-shadow: 0 4px 20px rgba(64, 145, 108, 0.4);
      background: linear-gradient(135deg, #2D6A4F 0%, #40916C 100%);
      z-index: 10;
    }
    
    #localVideo.audio-only {
      display: none;
    }
    
    #remoteVideo.audio-only {
      display: none;
    }
    
    .placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
      z-index: 5;
    }
    
    .placeholder.hidden {
      display: none;
    }
    
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #52B788 0%, #74C69D 50%, #95D5B2 100%); /* Light sage gradient */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: bold;
      color: white;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(64, 145, 108, 0.4);
    }
    
    .name {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    
    .status {
      font-size: 16px;
      opacity: 0.7;
    }
    
    #localVideoDisabled {
      position: absolute;
      top: 60px;
      right: 16px;
      width: 100px;
      height: 140px;
      border-radius: 12px;
      border: 2px solid rgba(149, 213, 178, 0.5); /* Light mint border */
      background: linear-gradient(135deg, #40916C 0%, #52B788 100%); /* Light emerald gradient */
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    
    #localVideoDisabled svg {
      width: 32px;
      height: 32px;
      fill: rgba(255, 255, 255, 0.5);
    }
    
    #localVideoDisabled.visible {
      display: flex;
    }
  </style>
</head>
<body>
  <div id="container">
    <!-- Remote Video (Full Screen) -->
    <video id="remoteVideo" autoplay playsinline></video>
    
    <!-- Local Video (PiP) -->
    <video id="localVideo" autoplay playsinline muted></video>
    
    <!-- Local Video Disabled Placeholder -->
    <div id="localVideoDisabled">
      <svg viewBox="0 0 24 24">
        <path d="M21 6.5l-4 4V7c0-.55-.45-1-1-1H9.82L21 17.18V6.5zM3.27 2L2 3.27 4.73 6H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.21 0 .39-.08.54-.18L19.73 21 21 19.73 3.27 2z"/>
      </svg>
    </div>
    
    <!-- Placeholder for when remote video is not available -->
    <div id="placeholder" class="placeholder">
      <div class="avatar" id="avatarInitial">?</div>
      <div class="name" id="remoteName">Connecting...</div>
      <div class="status" id="callStatus">Initializing</div>
    </div>
  </div>

  <script>
    // ============================================
    // WebRTC Call Client - Open Source Implementation
    // ============================================
    
    class WebRTCClient {
      constructor() {
        this.peerConnection = null;
        this.localStream = null;
        this.remoteStream = null;
        this.websocket = null;
        this.callId = null;
        this.userId = null;
        this.isVideoCall = true;
        this.isMuted = false;
        this.isVideoEnabled = true;
        this.isFrontCamera = true;
        
        // ICE Servers - Free STUN servers (no cost)
        this.iceServers = {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' },
            { urls: 'stun:stun.stunprotocol.org:3478' }
          ]
        };
        
        this.localVideo = document.getElementById('localVideo');
        this.remoteVideo = document.getElementById('remoteVideo');
        this.placeholder = document.getElementById('placeholder');
        this.localVideoDisabled = document.getElementById('localVideoDisabled');
      }
      
      // Send message to Flutter
      sendToFlutter(type, data) {
        const message = JSON.stringify({ type, ...data });
        // Using console.log for Flutter to intercept via onConsoleMessage
        console.log('FLUTTER_MSG:' + message);
        
        // Also try webkit message handler for iOS
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.flutterHandler) {
          window.webkit.messageHandlers.flutterHandler.postMessage(message);
        }
        
        // Try Android JavascriptInterface
        if (window.FlutterChannel) {
          window.FlutterChannel.postMessage(message);
        }
      }
      
      // Initialize the client
      async init(config) {
        this.callId = config.callId;
        this.userId = config.userId;
        this.isVideoCall = config.isVideo !== false;
        this.signalingUrl = config.signalingUrl;
        
        // Update UI
        if (config.remoteName) {
          document.getElementById('remoteName').textContent = config.remoteName;
          document.getElementById('avatarInitial').textContent = config.remoteName.charAt(0).toUpperCase();
        }
        
        if (!this.isVideoCall) {
          this.localVideo.classList.add('audio-only');
          this.remoteVideo.classList.add('audio-only');
        }
        
        this.sendToFlutter('initialized', { callId: this.callId });
      }
      
      // Connect to signaling server (WebSocket)
      async connectSignaling(url) {
        return new Promise((resolve, reject) => {
          try {
            this.websocket = new WebSocket(url);
            
            this.websocket.onopen = () => {
              console.log('WebSocket connected');
              this.sendToFlutter('signalingConnected', {});
              resolve();
            };
            
            this.websocket.onmessage = (event) => {
              this.handleSignalingMessage(JSON.parse(event.data));
            };
            
            this.websocket.onerror = (error) => {
              console.error('WebSocket error:', error);
              this.sendToFlutter('error', { message: 'Signaling connection failed' });
              reject(error);
            };
            
            this.websocket.onclose = () => {
              console.log('WebSocket closed');
              this.sendToFlutter('signalingDisconnected', {});
            };
          } catch (e) {
            reject(e);
          }
        });
      }
      
      // Handle signaling messages
      async handleSignalingMessage(message) {
        switch (message.type) {
          case 'offer':
            await this.handleOffer(message);
            break;
          case 'answer':
            await this.handleAnswer(message);
            break;
          case 'ice-candidate':
            await this.handleIceCandidate(message);
            break;
          case 'call-ended':
            this.handleCallEnded();
            break;
          case 'call-declined':
            this.sendToFlutter('callDeclined', {});
            break;
          case 'call-accepted':
            this.sendToFlutter('callAccepted', {});
            break;
        }
      }
      
      // Send signaling message
      sendSignaling(message) {
        // Send to Flutter for Firebase signaling
        this.sendToFlutter('signaling', {
          ...message,
          callId: this.callId,
          userId: this.userId
        });
        
        // Also send via WebSocket if connected
        if (this.websocket && this.websocket.readyState === WebSocket.OPEN) {
          this.websocket.send(JSON.stringify({
            ...message,
            callId: this.callId,
            userId: this.userId
          }));
        }
      }
      
      // Get user media
      async getUserMedia() {
        try {
          const constraints = {
            audio: true,
            video: this.isVideoCall ? {
              facingMode: this.isFrontCamera ? 'user' : 'environment',
              width: { ideal: 1280 },
              height: { ideal: 720 }
            } : false
          };
          
          this.localStream = await navigator.mediaDevices.getUserMedia(constraints);
          this.localVideo.srcObject = this.localStream;
          
          this.sendToFlutter('localStreamReady', {});
          return true;
        } catch (error) {
          console.error('getUserMedia error:', error);
          this.sendToFlutter('error', { message: 'Failed to access camera/microphone: ' + error.message });
          return false;
        }
      }
      
      // Create peer connection
      createPeerConnection() {
        this.peerConnection = new RTCPeerConnection(this.iceServers);
        
        // Add local tracks
        if (this.localStream) {
          this.localStream.getTracks().forEach(track => {
            this.peerConnection.addTrack(track, this.localStream);
          });
        }
        
        // Handle remote stream
        this.peerConnection.ontrack = (event) => {
          if (event.streams && event.streams[0]) {
            this.remoteStream = event.streams[0];
            this.remoteVideo.srcObject = this.remoteStream;
            this.placeholder.classList.add('hidden');
            this.sendToFlutter('remoteStreamReady', {});
          }
        };
        
        // Handle ICE candidates
        this.peerConnection.onicecandidate = (event) => {
          if (event.candidate) {
            this.sendSignaling({
              type: 'ice-candidate',
              candidate: event.candidate.toJSON()
            });
          }
        };
        
        // Handle connection state
        this.peerConnection.onconnectionstatechange = () => {
          const state = this.peerConnection.connectionState;
          console.log('Connection state:', state);
          this.sendToFlutter('connectionStateChange', { state });
          
          if (state === 'connected') {
            this.sendToFlutter('callConnected', {});
            document.getElementById('callStatus').textContent = 'Connected';
          } else if (state === 'disconnected' || state === 'failed' || state === 'closed') {
            this.sendToFlutter('callEnded', {});
          }
        };
        
        // Handle ICE connection state
        this.peerConnection.oniceconnectionstatechange = () => {
          console.log('ICE connection state:', this.peerConnection.iceConnectionState);
          this.sendToFlutter('iceStateChange', { state: this.peerConnection.iceConnectionState });
        };
      }
      
      // Start call (caller)
      async startCall() {
        document.getElementById('callStatus').textContent = 'Calling...';
        
        const mediaReady = await this.getUserMedia();
        if (!mediaReady) return false;
        
        this.createPeerConnection();
        
        try {
          const offer = await this.peerConnection.createOffer({
            offerToReceiveAudio: true,
            offerToReceiveVideo: this.isVideoCall
          });
          
          await this.peerConnection.setLocalDescription(offer);
          
          this.sendSignaling({
            type: 'offer',
            sdp: offer.sdp
          });
          
          this.sendToFlutter('offerSent', {});
          return true;
        } catch (error) {
          console.error('createOffer error:', error);
          this.sendToFlutter('error', { message: 'Failed to create offer: ' + error.message });
          return false;
        }
      }
      
      // Answer call (callee)
      async answerCall() {
        document.getElementById('callStatus').textContent = 'Connecting...';
        
        const mediaReady = await this.getUserMedia();
        if (!mediaReady) return false;
        
        this.sendToFlutter('answerReady', {});
        return true;
      }
      
      // Handle incoming offer
      async handleOffer(message) {
        document.getElementById('callStatus').textContent = 'Connecting...';
        
        if (!this.localStream) {
          await this.getUserMedia();
        }
        
        this.createPeerConnection();
        
        try {
          await this.peerConnection.setRemoteDescription(
            new RTCSessionDescription({ type: 'offer', sdp: message.sdp })
          );
          
          const answer = await this.peerConnection.createAnswer();
          await this.peerConnection.setLocalDescription(answer);
          
          this.sendSignaling({
            type: 'answer',
            sdp: answer.sdp
          });
          
          this.sendToFlutter('answerSent', {});
        } catch (error) {
          console.error('handleOffer error:', error);
          this.sendToFlutter('error', { message: 'Failed to handle offer: ' + error.message });
        }
      }
      
      // Handle incoming answer
      async handleAnswer(message) {
        try {
          if (this.peerConnection && !this.peerConnection.currentRemoteDescription) {
            await this.peerConnection.setRemoteDescription(
              new RTCSessionDescription({ type: 'answer', sdp: message.sdp })
            );
            this.sendToFlutter('answerReceived', {});
          }
        } catch (error) {
          console.error('handleAnswer error:', error);
          this.sendToFlutter('error', { message: 'Failed to handle answer: ' + error.message });
        }
      }
      
      // Handle ICE candidate
      async handleIceCandidate(message) {
        try {
          if (this.peerConnection && message.candidate) {
            await this.peerConnection.addIceCandidate(new RTCIceCandidate(message.candidate));
          }
        } catch (error) {
          console.error('handleIceCandidate error:', error);
        }
      }
      
      // Toggle mute
      toggleMute() {
        if (this.localStream) {
          const audioTracks = this.localStream.getAudioTracks();
          audioTracks.forEach(track => {
            track.enabled = this.isMuted;
          });
          this.isMuted = !this.isMuted;
          this.sendToFlutter('muteChanged', { isMuted: this.isMuted });
        }
      }
      
      // Toggle video
      toggleVideo() {
        if (this.localStream && this.isVideoCall) {
          const videoTracks = this.localStream.getVideoTracks();
          videoTracks.forEach(track => {
            track.enabled = !this.isVideoEnabled;
          });
          this.isVideoEnabled = !this.isVideoEnabled;
          
          if (this.isVideoEnabled) {
            this.localVideo.style.display = 'block';
            this.localVideoDisabled.classList.remove('visible');
          } else {
            this.localVideo.style.display = 'none';
            this.localVideoDisabled.classList.add('visible');
          }
          
          this.sendToFlutter('videoChanged', { isVideoEnabled: this.isVideoEnabled });
        }
      }
      
      // Switch camera
      async switchCamera() {
        if (this.localStream && this.isVideoCall) {
          const videoTracks = this.localStream.getVideoTracks();
          if (videoTracks.length > 0) {
            videoTracks[0].stop();
          }
          
          this.isFrontCamera = !this.isFrontCamera;
          
          try {
            const newStream = await navigator.mediaDevices.getUserMedia({
              video: {
                facingMode: this.isFrontCamera ? 'user' : 'environment',
                width: { ideal: 1280 },
                height: { ideal: 720 }
              }
            });
            
            const newVideoTrack = newStream.getVideoTracks()[0];
            this.localStream.removeTrack(videoTracks[0]);
            this.localStream.addTrack(newVideoTrack);
            
            // Replace track in peer connection
            if (this.peerConnection) {
              const sender = this.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
              if (sender) {
                await sender.replaceTrack(newVideoTrack);
              }
            }
            
            this.localVideo.srcObject = this.localStream;
            this.sendToFlutter('cameraSwitched', { isFrontCamera: this.isFrontCamera });
          } catch (error) {
            console.error('switchCamera error:', error);
            this.sendToFlutter('error', { message: 'Failed to switch camera: ' + error.message });
          }
        }
      }
      
      // End call
      endCall() {
        this.sendSignaling({ type: 'call-ended' });
        this.cleanup();
        this.sendToFlutter('callEnded', {});
      }
      
      // Handle call ended by remote
      handleCallEnded() {
        this.cleanup();
        this.sendToFlutter('callEnded', {});
      }
      
      // Cleanup resources
      cleanup() {
        if (this.localStream) {
          this.localStream.getTracks().forEach(track => track.stop());
          this.localStream = null;
        }
        
        if (this.peerConnection) {
          this.peerConnection.close();
          this.peerConnection = null;
        }
        
        if (this.websocket) {
          this.websocket.close();
          this.websocket = null;
        }
        
        this.localVideo.srcObject = null;
        this.remoteVideo.srcObject = null;
      }
      
      // Update status text
      updateStatus(status) {
        document.getElementById('callStatus').textContent = status;
      }
    }
    
    // Global client instance
    const client = new WebRTCClient();
    
    // Expose methods to Flutter
    window.WebRTCClient = {
      init: (config) => client.init(config),
      connectSignaling: (url) => client.connectSignaling(url),
      startCall: () => client.startCall(),
      answerCall: () => client.answerCall(),
      toggleMute: () => client.toggleMute(),
      toggleVideo: () => client.toggleVideo(),
      switchCamera: () => client.switchCamera(),
      endCall: () => client.endCall(),
      updateStatus: (status) => client.updateStatus(status),
      handleSignalingMessage: (msg) => client.handleSignalingMessage(msg)
    };
    
    // Notify Flutter that the page is ready
    document.addEventListener('DOMContentLoaded', () => {
      client.sendToFlutter('pageReady', {});
    });
  </script>
</body>
</html>
