appId: com.sportconnect.sport_connect
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Welcome Back"
    timeout: 15000
- tapOn:
    text: "Enter your email"
- inputText: "testuser@sportconnect.com"
- hideKeyboard
- tapOn:
    text: "Enter your password"
- inputText: "WrongPass123"
- hideKeyboard
- tapOn:
    text: "Sign In"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000
    optional: true
- takeScreenshot: after-login-attempt
