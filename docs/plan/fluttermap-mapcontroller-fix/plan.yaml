    title: "Add guard to state listener and defer execution"
    description: |
      Secure the main state listener (lines ~206-213) that listens to riderHomeViewModelProvider:
      1. Wrap listener callback in Future.microtask() to defer execution to next frame
      2. Add conditional guard: only execute _mapController.move() if _mapReady == true
      3. Ensure existing canMoveMap() checks still work correctly
      4. Keep the listener subscription itself (do not remove listening), only defer callback
      5. Maintain all error handling and state checks from original listener
      
      Guard logic:
      ```
      if (next.locationState == LocationPermissionState.ready &&
          next.showMapView &&
          _mapReady &&  // ← ADD THIS CHECK
          next.isFollowingUser &&
          next.currentLocation != null) {
        // ... proceed with move
      }
      ```
      
      Execution defer (wrap entire callback in microtask):
      ```
      ref.listen<RiderHomeState>(riderHomeViewModelProvider, (previous, next) {
        Future.microtask(() {
          if (next.locationState == ...) { ... }
        });
      });
      ```
      
      Code location: lines ~190-213 in rider_home_screen.dart
      
      Deliverables: Modified listener with guard and deferred execution
