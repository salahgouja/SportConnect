plan_id: flutter_map_controller_investigation
objective: Investigate and document the FlutterMap MapController error in RiderHomeScreen
focus_area: lib/features/home/ - MapController lifecycle and state management integration
created_at: '2026-04-01'
created_by: GitHub Copilot (gem-researcher mode)
status: completed

tldr: |
  The FlutterMap MapController error occurs due to a race condition between state listener execution and widget rendering.
  When showMap() is called from the _MapToggleCard tap handler, the state listener synchronously attempts to move the MapController
  before the FlutterMap widget has been rendered in the widget tree.
  The issue manifests at line 206 in rider_home_screen.dart where _mapController.move() is called without error handling or guards.
  Current safeguards are minimal - only line 1302 includes a null check (for currentLocation), but no try-catch or map-ready verification exists.

research_metadata:
  methodology: |
    Hybrid retrieval approach:
    1. grep_search: Located MapController usage patterns and addPostFrameCallback examples in codebase
    2. read_file: Analyzed full context of RiderHomeScreen, RiderHomeViewModel, and RiderHomeFeed
    3. Relationship discovery: Traced state flow from user action → state change → listener execution → widget render
    4. Pattern analysis: Identified timing mismatch between listener firing and FlutterMap widget rendering
  scope: |
    In-depth examination of RiderHomeScreen state management (rider_home_screen.dart),
    RiderHomeViewModel lifecycle (rider_home_view_model.dart),
    RiderHomeFeed widget structure (rider_home_feed.dart),
    with focus on MapController initialization and access patterns
  confidence: high
  coverage: 100 % of relevant code paths analyzed

files_analyzed:
  - file: lib/features/home/views/rider_home_screen.dart
    path: rider_home_screen.dart
    purpose: |
      Main screen managing feed vs map view toggle, MapController lifecycle, state listeners,
      and map control interactions (follow user, etc.)
    key_elements:
