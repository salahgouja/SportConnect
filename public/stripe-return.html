<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportConnect - Setup Complete</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #2D6A4F 0%, #40916C 50%, #52B788 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .icon {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: #E8F5E9;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
      color: #40916C;
      font-weight: bold;
    }
    .brand { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #40916C; margin-bottom: 4px; }
    h1 { font-size: 22px; margin-bottom: 8px; color: #1a1a1a; }
    p { font-size: 15px; color: #666; line-height: 1.5; margin-bottom: 20px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #E8F5E9;
      border-top-color: #40916C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .small { font-size: 13px; color: #999; }
  </style>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('userId') || '';
    window.location.href = 'sportconnect://driver/onboarding/complete?userId=' + userId;
    setTimeout(function() {
      document.getElementById('redirect-msg').style.display = 'block';
      document.getElementById('loading-msg').style.display = 'none';
    }, 2000);
  </script>
</head>
<body>
  <div class="card">
    <div class="icon">&#10003;</div>
    <div class="brand">SportConnect</div>
    <h1>Setup Complete!</h1>
    <div id="loading-msg">
      <div class="spinner"></div>
      <p>Returning to SportConnect...</p>
    </div>
    <div id="redirect-msg" style="display:none;">
      <p>If the app doesn't open automatically, please return to the SportConnect app manually.</p>
      <p class="small">Your Stripe account has been set up successfully. 🎉</p>
    </div>
  </div>
</body>
</html>
