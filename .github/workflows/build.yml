name: Flutter Build and Release

on:
  push:
    # This triggers the workflow ONLY when you push a tag like "v1.0.0"
    tags:
      - 'v*' 

jobs:
  # ==========================================
  # Android Build Job
  # ==========================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest # Ubuntu is faster and cheaper for Android builds

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Android builds require Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Flutter supports Java 17 for newer Android Gradle plugins

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        # Change 'apk' to 'appbundle' if you want an .aab file for the Play Store
        run: flutter build apk --release 

      - name: Push to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Automatically attaches the built APK to your GitHub Release page
          files: build/app/outputs/flutter-apk/app-release.apk

  # ==========================================
  # iOS Build Job
  # ==========================================
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (Unsigned)
        run: flutter build ios --release --no-codesign

      # Compresses the iOS .app file into a standard zipped package so it can be uploaded
      - name: Compress iOS Payload
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload
          zip -qq -r ios-release-unsigned.zip Payload

      - name: Push to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Attaches the zipped iOS app to the same GitHub Release
          files: ios-release-unsigned.zip