name: Deploy Android to Play Store

# Trigger on version tags (e.g. v1.2.3) or manually via GitHub UI
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - production

permissions:
  contents: read

jobs:
  deploy-android:
    name: Build & Deploy Android AAB
    runs-on: ubuntu-latest

    steps:
      # ── Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java (required for Android Gradle builds) ─────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # ── Flutter ────────────────────────────────────────────────────────────
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      # ── Android signing ────────────────────────────────────────────────────
      # The build.gradle.kts reads android/key.properties + the .jks file it
      # references. We recreate both from GitHub Secrets at build time so that
      # signing credentials never live in the repository.
      - name: Decode upload keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > android/upload-keystore.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build signed Android App Bundle (AAB)
        run: flutter build appbundle --release

      # ── Ruby / Fastlane ────────────────────────────────────────────────────
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true   # caches the Gemfile.lock bundle automatically

      # ── Deploy ─────────────────────────────────────────────────────────────
      - name: Upload AAB to Play Store internal track
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: bundle exec fastlane android internal

      # ── Cleanup (security) ─────────────────────────────────────────────────
      - name: Remove keystore artifacts
        if: always()
        run: |
          rm -f android/upload-keystore.jks
          rm -f android/key.properties
