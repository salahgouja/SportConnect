name: sport_connect
description: "SportConnect - Social carpooling app for sports enthusiasts"
publish_to: "none"

version: 1.0.4

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  # flutter_svg: ^2.0.17

  # State Management (MVVM)
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Firebase Services
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  firebase_analytics: ^12.3.0
  firebase_crashlytics: ^5.2.0
  firebase_app_check: ^0.4.3
  firebase_database: ^12.3.0
  cloud_functions: ^6.2.0

  # Deep Linking & Notifications
  app_links: ^7.0.0
  flutter_local_notifications: ^21.0.0

  # Maps & Route Visualization
  flutter_map: ^8.2.2
  flutter_map_location_marker: ^10.2.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  map_launcher: ^4.4.3
  # flutter_map_marker_cluster: ^8.2.2
  # flutter_map_animations: ^0.9.0
  # flutter_map_marker_popup: ^8.1.0
  # flutter_polyline_points: ^3.1.0

  # Networking & HTTP
  dio: ^5.9.0
  retrofit: ^4.9.2

  # WebView (Stripe onboarding)
  flutter_inappwebview: ^6.1.5

  # Permissions
  permission_handler: ^12.0.1

  # Navigation
  go_router: ^17.0.1

  # Local Storage
  shared_preferences: ^2.3.3

  # Data Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Payments (Stripe)
  flutter_stripe: ^12.6.0

  # Core Utilities
  intl: ^0.20.1
  logger: ^2.5.0
  image_picker: ^1.1.2
  uuid: ^4.5.1
  share_plus: ^12.0.1
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2
  crypto: ^3.0.7
  path_provider: ^2.1.5

  # Audio
  record: ^6.2.0

  # Authentication
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1

  # App Features
  in_app_review: ^2.0.10
  in_app_purchase: ^3.2.2
  # showcaseview: ^5.0.1
  smooth_page_indicator: ^2.0.1
  emoji_picker_flutter: ^4.4.0

  # Essential Animations
  lottie: ^3.3.2
  flutter_animate: ^4.5.2
  # animations: ^2.0.11

  # UI Components
  wolt_modal_sheet: ^0.11.0
  skeletonizer: ^2.1.3
  flutter_typeahead: ^6.0.0
  sliver_tools: ^0.2.12
  flutter_chat_core: ^2.9.0
  flutter_chat_ui: ^2.11.1
  # table_calendar: ^3.2.0
  # badges: ^3.1.2
  # percent_indicator: ^4.2.5
  # flutter_slidable: ^4.0.3
  # card_swiper: ^3.0.1
  # carousel_slider: ^5.1.2

  # Secrets Management
  envied: ^1.3.3
  pdf: ^3.11.3
  printing: ^5.14.2
  flutter_svg: ^2.2.3
  geoflutterfire_plus: ^0.0.32

  # Logging & Debugging
  talker_flutter: ^5.1.12
  talker_riverpod_logger: ^5.1.12
  talker_dio_logger: ^5.1.12
  accessibility_tools: ^2.8.0

  riverpod_devtools_tracker: ^1.0.7

  riverpod: ^3.1.0
  reactive_forms: ^18.2.2
  v_chat_voice_player: ^3.1.4
  v_platform: ^2.1.5
  flutter_secure_storage: ^10.0.0
  upgrader: ^13.1.0
  adaptive_platform_ui: ^0.1.104
  native_geofence: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.10.4
  freezed: ^3.1.0
  json_serializable: ^6.11.2
  riverpod_generator: ^4.0.0
  riverpod_lint: ^3.1.0
  go_router_builder: ^4.2.1
  retrofit_generator: ^10.2.1
  custom_lint: ^0.8.1

  # Secrets Management
  envied_generator: ^1.3.3

  # Testing
  mockito: ^5.4.4

  # Seed Tool
  faker: ^2.2.0
  args: ^2.6.0

  # Production UI
  flutter_launcher_icons: ^0.14.4

  # Development Tools
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - shorebird.yaml

# Flutter Native Splash Configuration
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#1A1A1A"
  image: assets/images/splash_logo.png
  image_dark: assets/images/splash_logo_dark.png
  fullscreen: true
  android_12:
    image: assets/images/splash_logo_android12.png
    image_dark: assets/images/splash_logo_android12_dark.png

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon_light.png"
  image_path_ios: "assets/icons/app_icon_light.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  adaptive_icon_foreground_inset: 16
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon_light.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
