appId: com.sportconnect.sport_connect
---
# ============================================
# Validation: Password Strength Indicator
# ============================================
# Tests the password strength visual indicator
# on the signup wizard screen
# ============================================

- launchApp:
    clearState: true
    label: Launch SportConnect fresh

# Navigate to signup
- extendedWaitUntil:
    visible: "Welcome Back"
    timeout: 10000
- tapOn:
    text: "Sign Up"
    label: Navigate to registration

# Select Rider role
- runFlow:
    when:
      visible: "Find rides"
    commands:
      - tapOn: "Find rides"

# Fill Step 1 fields to proceed to Step 2 (Security)
- tapOn: "Enter your full name"
- inputText: "Test User"
- tapOn: "Enter your email"
- inputText: "strength@test.com"

# Proceed to Security step (if wizard flow)
- runFlow:
    when:
      visible: "Next"
    commands:
      - tapOn: "Next"

# -----------------------------------------------
# Test 1: Weak password (short, no complexity)
# -----------------------------------------------
- runFlow:
    when:
      visible: "Create Password"
    commands:
      - tapOn: "Create Password"
      - inputText: "abc"
      - assertVisible: "Weak"
      - takeScreenshot: password-strength-weak

# -----------------------------------------------
# Test 2: Fair password (length >= 8)
# -----------------------------------------------
- runFlow:
    when:
      visible: "Create Password"
    commands:
      - tapOn: "Create Password"
      - eraseText:
          charactersToErase: 50
      - inputText: "abcdefgh"
      - assertVisible: "Fair"
      - takeScreenshot: password-strength-fair

# -----------------------------------------------
# Test 3: Good password (length + uppercase)
# -----------------------------------------------
- runFlow:
    when:
      visible: "Create Password"
    commands:
      - tapOn: "Create Password"
      - eraseText:
          charactersToErase: 50
      - inputText: "Abcdefgh1"
      - assertVisible: "Good"
      - takeScreenshot: password-strength-good

# -----------------------------------------------
# Test 4: Strong password (length + uppercase + digit + special)
# -----------------------------------------------
- runFlow:
    when:
      visible: "Create Password"
    commands:
      - tapOn: "Create Password"
      - eraseText:
          charactersToErase: 50
      - inputText: "Abcdefg1!"
      - assertVisible: "Strong"
      - takeScreenshot: password-strength-strong

# -----------------------------------------------
# Verify password tips text
# -----------------------------------------------
- assertVisible:
    text: "Use 8+ characters with letters, numbers & symbols|Strong Password Tips"

- takeScreenshot: password-strength-complete

