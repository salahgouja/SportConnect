patterns_found:
  - category: architecture
    pattern: Dual persisted lifecycle fields
    description: Ride lifecycle is represented by both status (RideStatus) and ridePhase (string) on the ride document.
    examples:
      - file: lib/features/rides/models/ride/ride_model.dart
        location: 15
        snippet: enum RideStatus { draft, active, full, inProgress, completed, cancelled }
      - file: lib/features/rides/models/ride/ride_model.dart
        location: 43
        snippet: String? ridePhase
    prevalence: common

  - category: structure
    pattern: Repository-centric persisted transition writes
    description: Persisted writes for start/completion/phase are centralized in RideRepository methods.
    examples:
      - file: lib/features/rides/repositories/ride_repository.dart
        location: 536
        snippet: startRide writes status=inProgress and ridePhase=pickingUp
      - file: lib/features/rides/repositories/ride_repository.dart
        location: 570
        snippet: completeRide writes status=completed and ridePhase=completed
      - file: lib/features/rides/repositories/ride_repository.dart
        location: 582
        snippet: updateRidePhase writes ridePhase only
    prevalence: common

  - category: architecture
    pattern: Optimistic local phase transitions with asynchronous persistence
    description: ActiveRideViewModel updates local phase first, then sends unawaited persistence for enRoute/arriving.
    examples:
      - file: lib/features/rides/view_models/ride_view_model.dart
        location: 2209
        snippet: state = state.copyWith(phase: ActiveRidePhase.arriving)
      - file: lib/features/rides/view_models/ride_view_model.dart
        location: 2215
        snippet: unawaited(updateRidePhase(..., 'arriving'))
      - file: lib/features/rides/view_models/ride_view_model.dart
        location: 2282
        snippet: state = state.copyWith(phase: ActiveRidePhase.enRoute)
    prevalence: common

  - category: structure
    pattern: Status-transition guarded navigation
    description: Countdown/driver detail viewmodels prevent repeated auto-navigation by requiring status transitions.
    examples:
      - file: lib/features/rides/view_models/ride_countdown_view_model.dart
        location: 118
        snippet: registerRideStatus checks previousStatus before navigation
      - file: lib/features/rides/view_models/driver_view_ride_view_model.dart
        location: 81
        snippet: registerRideStatus only navigates on transition to inProgress
    prevalence: occasional

  - category: naming
    pattern: Role-specific active ride routes with one cross-role reference
    description: Most passenger entry points use riderActiveRide route; one passenger detail CTA targets driverActiveRide name.
    examples:
      - file: lib/features/home/views/rider_home_screen.dart
        location: 188
        snippet: context.push('${AppRoutes.riderActiveRide.path}?rideId=${ride.id}')
      - file: lib/features/rides/views/passenger/ride_detail_screen.dart
        location: 1807
        snippet: AppRoutes.driverActiveRide.name
    prevalence: occasional

