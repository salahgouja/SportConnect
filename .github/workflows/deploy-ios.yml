name: Deploy iOS to TestFlight

# Trigger on version tags (e.g. v1.2.3) or manually via GitHub UI
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ios:
    name: Build & Deploy iOS IPA to TestFlight
    runs-on: macos-latest

    env:
      # ── App Store Connect API key ─────────────────────────────────────────
      # All three are read automatically by the codemagic CLI from env.
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID:      ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY:    ${{ secrets.APP_STORE_CONNECT_API_KEY }}
      # ── RSA 2048 certificate private key ─────────────────────────────────
      # Generated ONCE with: ssh-keygen -t rsa -b 2048 -m PEM -f cert_key -q -N ""
      # The CLI uses this key to fetch the existing Apple distribution cert,
      # or creates one if it doesn't exist yet. Never regenerate this key or
      # a new Apple certificate will be created.
      CERTIFICATE_PRIVATE_KEY:          ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
      # ── 10-digit Apple ID of the app in App Store Connect ─────────────────
      APP_STORE_APPLE_ID:               ${{ secrets.APP_STORE_APP_ID }}

    steps:
      # ── Source ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Flutter ─────────────────────────────────────────────────────────────
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      # ── Codemagic CLI tools ──────────────────────────────────────────────────
      - name: Install Codemagic CLI tools
        run: pipx install codemagic-cli-tools

      # ── Code signing ─────────────────────────────────────────────────────────
      - name: Initialize keychain
        run: keychain initialize

      # CLI reads CERTIFICATE_PRIVATE_KEY, APP_STORE_CONNECT_* from env automatically.
      # Fetches existing cert matching the key, creates one only on first run.
      - name: Fetch certificate and provisioning profile from Apple
        run: |
          app-store-connect fetch-signing-files \
            $(xcode-project detect-bundle-id) \
            --type IOS_APP_STORE \
            --create

      - name: Add certificate to keychain
        run: keychain add-certificates

      - name: Configure Xcode project signing
        run: xcode-project use-profiles

      # ── Version ──────────────────────────────────────────────────────────────
      - name: Derive build name from git tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "build_name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Get latest TestFlight build number and increment
        run: |
          cd ios
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          NEW_BUILD=$(( LATEST + 1 ))
          agvtool new-version -all "$NEW_BUILD"
          echo "New build number: $NEW_BUILD"

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build Flutter IPA (release)
        run: |
          flutter build ipa --release \
            --build-name="${{ steps.version.outputs.build_name }}" \
            --export-options-plist="$HOME/export_options.plist"

      # ── Upload ────────────────────────────────────────────────────────────────
      - name: Upload IPA to TestFlight
        run: |
          APP_FILE=$(find "$(pwd)" -name "*.ipa" | head -1)
          app-store-connect publish \
            --path "$APP_FILE"

      # ── Cleanup ───────────────────────────────────────────────────────────────
      - name: Delete keychain
        if: always()
        run: keychain delete || true
