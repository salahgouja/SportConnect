name: iOS Simulator Build (Appetize)

# Run manually from the GitHub Actions tab whenever you need a fresh build
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-simulator:
    name: Build iOS Simulator .app
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build for iOS Simulator (no signing needed)
        run: flutter build ios --simulator --no-codesign

      - name: Zip .app bundle
        run: |
          cd build/ios/iphonesimulator
          zip -r "$GITHUB_WORKSPACE/Runner.zip" Runner.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: Runner.zip
          retention-days: 5
