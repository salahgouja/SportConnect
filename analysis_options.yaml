# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

plugins:
  riverpod_lint: 3.1.3


# Dart Code Metrics Configuration - Comprehensive Code Quality Analysis
dcm:
  # Function/Method Metrics (9 metrics)
  metrics:
    # Complexity Metrics
    cyclomatic-complexity: 10  # Max 10 independent paths (warn above)
    halstead-volume: 600       # Max information complexity
    
    # Size Metrics
    lines-of-code: 100         # Max lines per function (warn above)
    source-lines-of-code: 80   # Max executable lines (excluding blanks/comments)
    
    # Maintenance Metrics
    maintainability-index: 0.7  # Min maintainability (0-100 scale, warn below 50)
    maximum-nesting-level: 5   # Max nested blocks in function
    
    # Function Signature Metrics
    number-of-parameters: 5    # Max parameters per function
    
    # Widget-specific Metrics (Flutter)
    number-of-used-widgets: 30 # Max widgets in build method
    widgets-nesting-level: 5   # Max nested widgets
    
    technical-debt: 20
    
  metrics-exclude:
    - test/**
    - lib/generated/**
  rules:
    # Assignments & Conditions (Correctness)
    - avoid-assignments-as-conditions
    - avoid-cascade-after-if-null
    - avoid-collection-methods-with-unrelated-types
    - avoid-conditions-with-boolean-literals
    - avoid-self-compare
    - avoid-unnecessary-conditionals
    - no-equal-then-else

    # Type Safety (Correctness)
    - avoid-casting-to-extension-type
    - avoid-dynamic
    - avoid-generics-shadowing
    - avoid-unrelated-type-assertions
    - avoid-unnecessary-type-assertions
    - avoid-unnecessary-type-casts

    # Imports (Correctness)
    - avoid-double-slash-imports
    - avoid-duplicate-exports

    # Collections (Correctness)
    - avoid-empty-spread
    - avoid-misused-set-literals
    - prefer-iterable-of

    # Async/Await (Correctness)
    - avoid-passing-async-when-sync-expected
    - avoid-redundant-async

    # Nullability (Correctness)
    - avoid-nullable-tostring

    # State Management (Correctness)
    - avoid-late-keyword

    # Code Quality (Correctness)
    - avoid-commented-out-code
    - avoid-duplicate-mixins
    - avoid-explicit-pattern-field-name
    - avoid-missed-calls
    - avoid-nested-records
    - avoid-passing-self-as-argument
    - avoid-self-assignment
    - avoid-throw-in-catch-block
    - avoid-unused-parameters

    # Testing (Correctness)
    - avoid-duplicate-test-assertions
    # - missing-test-assertion
    - prefer-correct-test-file-name

    # Readability & Consistency
    - prefer-match-file-name
    - no-empty-block

    # Memory & Performance
    - always-remove-listener
    - avoid-border-all
    - avoid-expanded-as-spacer
    - avoid-incorrect-image-opacity

    # Accessibility & Semantics
    - avoid-missing-image-alt
    - prefer-text-rich

    # Widget Best Practices
    - avoid-incomplete-copy-with
    - avoid-returning-widgets
    - avoid-shrink-wrap-in-lists
    - avoid-unnecessary-setstate
    - avoid-unnecessary-stateful-widgets
    - avoid-wrapping-in-padding
    - check-for-equals-in-render-object-setters
    - consistent-update-render-object

    # Constructors & Constants
    - prefer-const-border-radius
    - prefer-correct-edge-insets-constructor
    - prefer-define-hero-tag

    # Code Organization
    - prefer-extracting-callbacks
    # - prefer-single-widget-per-file
    - prefer-using-list-view
    - use-setstate-synchronously
    
# Additional Metrics Configuration
analyzer:
  # Error level Configuration
  errors:
    missing_required_param: error
    missing_return: error
    todo: ignore

