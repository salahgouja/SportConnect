name: Flutter Build and Release

on:
  push:
    # This triggers the workflow ONLY when you push a tag like "v0.0.11"
    tags:
      - 'v*' 

permissions:
  contents: write

jobs:
  # ==========================================
  # Android Build Job
  # ==========================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest # Ubuntu is faster and cheaper for Android builds

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Android builds require Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # Flutter supports Java 17 for newer Android Gradle plugins

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        # Change 'apk' to 'appbundle' if you want an .aab file for the Play Store
        run: flutter build apk --debug 

      - name: Push to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Automatically attaches the built APK to your GitHub Release page
          files: build/app/outputs/flutter-apk/app-debug.apk

  # ==========================================
  # iOS Build Job
  # ==========================================
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app-unsigned.ipa Payload

      - name: Push to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-unsigned.ipa