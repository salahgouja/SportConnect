      location: lib/features/home/views/rider_home_screen.dart
      relationship_to_domain: Core container managing map lifecycle and state listeners

    - component: RiderHomeViewModel (Riverpod notifier)
      responsibility: |
        State container and business logic owner for rider home screen.
        Manages location acquisition, map settings, filters, route info.
        Provides showMap() and showFeed() methods to toggle view mode.
      location: lib/features/home/view_models/rider_home_view_model.dart
