name: Deploy Android to Play Store

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

# Cancel any in-progress run for the same ref so we never have
# two signing jobs racing each other
concurrency:
  group: deploy-android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-android:
    name: Build & Deploy Android AAB
    runs-on: ubuntu-latest

    steps:
      # ── Source ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history needed for changelog generation

      # ── Java ────────────────────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # ── Flutter ─────────────────────────────────────────────────────────
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install Flutter dependencies
        run: flutter pub get

      # ── Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Android signing ─────────────────────────────────────────────────
      - name: Decode upload keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > android/upload-keystore.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      # ── Build ────────────────────────────────────────────────────────────
      # NOTE: The AAB is built inside the Fastfile (after the Play Store
      # version code is fetched) so that --build-number matches the computed
      # value. Do NOT add a separate flutter build step here.

      # ── Ruby / Fastlane ──────────────────────────────────────────────────
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # ── Resolve deploy track ─────────────────────────────────────────────
      # For tag pushes, always deploy to internal first.
      # For manual dispatch, use the chosen track.
      - name: Set deploy track
        id: track
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "track=internal" >> "$GITHUB_OUTPUT"
          else
            echo "track=${{ inputs.track }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Deploy ───────────────────────────────────────────────────────────
      - name: Upload AAB to Play Store (${{ steps.track.outputs.track }})
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: bundle exec fastlane android deploy track:${{ steps.track.outputs.track }}

      # ── Cleanup (always, even on failure) ────────────────────────────────
      - name: Remove keystore artifacts
        if: always()
        run: |
          rm -f android/upload-keystore.jks
          rm -f android/key.properties

      # # ── Notify on failure ────────────────────────────────────────────────
      # # Remove this step if you don't use Slack.
      # # Add SLACK_WEBHOOK_URL to your repo secrets to enable it.
      # - name: Notify Slack on failure
      #   if: failure() && secrets.SLACK_WEBHOOK_URL != ''
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     payload: |
      #       {
      #         "text": ":x: Android deploy failed for *${{ github.ref_name }}*",
      #         "attachments": [{
      #           "color": "danger",
      #           "fields": [
      #             { "title": "Workflow", "value": "${{ github.workflow }}", "short": true },
      #             { "title": "Triggered by", "value": "${{ github.actor }}", "short": true },
      #             { "title": "Run URL", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" }
      #           ]
      #         }]
      #       }
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      #     SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
