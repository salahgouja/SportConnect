name: Deploy iOS to TestFlight

# Trigger on version tags (e.g. v1.2.3) or manually via GitHub UI
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ios:
    name: Build & Deploy iOS IPA to TestFlight
    runs-on: macos-latest

    env:
      # ── App Store Connect API key (3 values from App Store Connect dashboard) ──
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID:      ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY:    ${{ secrets.APP_STORE_CONNECT_API_KEY }}
      # ── Certificate private key (generated once, stored forever as a secret) ──
      # This ensures the SAME certificate is reused on every build.
      # Generate it once with: openssl ecparam -name prime256v1 -genkey -noout -out certificate_private_key.pem
      # Then store the file contents as this secret. Never regenerate it.
      CERTIFICATE_PRIVATE_KEY:          ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
      # ── 10-digit Apple ID of the app in App Store Connect ──
      APP_STORE_APP_ID:                 ${{ secrets.APP_STORE_APP_ID }}

    steps:
      # ── Source ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Flutter ─────────────────────────────────────────────────────────────
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      # ── Codemagic CLI tools ──────────────────────────────────────────────────
      # Open-source Python package — not Codemagic the platform.
      # Handles cert + profile fetching from Apple via the API key.
      - name: Install Codemagic CLI tools
        run: pipx install codemagic-cli-tools

      # ── Code signing ─────────────────────────────────────────────────────────
      - name: Initialize keychain
        run: keychain initialize

      # fetch-signing-files fetches the existing cert tied to CERTIFICATE_PRIVATE_KEY.
      # It only creates a new cert if one doesn't exist in Apple yet.
      # Apple requires RSA 2048 for distribution certificates.
      # On every subsequent build it reuses the same cert — no new cert is generated.
      - name: Fetch certificate and provisioning profile from Apple
        run: |
          app-store-connect fetch-signing-files \
            com.sportconnect.SportConnectApplication \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --certificate-key-password "" \
            --create

      - name: Add certificate to keychain
        run: keychain add-certificates

      - name: Configure Xcode project signing
        run: xcode-project use-profiles

      # ── Version ──────────────────────────────────────────────────────────────
      - name: Derive build name and number from git tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          BUILD_NUMBER=$(( MAJOR * 1000000 + MINOR * 10000 + PATCH ))
          echo "build_name=$TAG"         >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build Flutter IPA (release)
        run: |
          flutter build ipa --release \
            --build-name="${{ steps.version.outputs.build_name }}" \
            --build-number="${{ steps.version.outputs.build_number }}" \
            --export-options-plist="$HOME/export_options.plist"

      # ── Upload ────────────────────────────────────────────────────────────────
      - name: Upload IPA to TestFlight
        run: |
          IPA=$(find "$(pwd)" -name "*.ipa" | head -1)
          app-store-connect publish \
            --path "$IPA" \
            --app-store-app-id "$APP_STORE_APP_ID"

      # ── Cleanup ───────────────────────────────────────────────────────────────
      - name: Delete keychain
        if: always()
        run: keychain delete || true
