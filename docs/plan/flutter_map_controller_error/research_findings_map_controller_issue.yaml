open_questions:
  - question: Does flutter_map's MapController have a way to check if the widget is mounted?
    context: |
      Researched: MapController documentation not fully examined.
      Understanding: No built-in ready/mounted check was found during investigation.
      Impact: Unable to guard move() calls with a simple mounted check.

  - question: Why does the state listener use !-force unwrap on currentLocation?
    context: |
      At line 206: _mapController.move(next.currentLocation!, next.currentZoom)
      The listener checks `next.currentLocation != null` at line 203, then force-unwraps at 206.
      Semantically safe but could be written as optional unwrap.
      Impact: Force unwrap indicates confidence but provides no additional safety in map timing issue.

  - question: Is there a WidgetsBinding.addPostFrameCallback usage pattern in other parts of codebase?
    context: |
      Found at lines 40, 72, 139, 185 in rider_home_screen.dart and driver_home_screen.dart.
      Pattern: Deferring critical operations until after frame is rendered.
      Opportunity: Could apply same pattern to map movement to defer until after FlutterMap is mounted.
      Impact: Most direct solution to race condition.

  - question: Does the listener need to fire immediately on every showMapView change?
    context: |
      Current behavior: showMap() → state changes → listener fires synchronously → move attempts.
      Could instead: showMap() → state changes → listener fires → defers move via addPostFrameCallback.
      Or: Only call move() after FlutterMap is guaranteed to be rendered.
      Impact: Determines whether solution is guard-based or defer-based or both.

gaps:
  - area: Error handling for MapController operations
    description: |
      Lines 206 and 1302 both call _mapController.move() without any try-catch blocks.
      No error recovery strategy if MapController is accessed before FlutterMap mounts.
      Similar operations in other parts use try-catch (e.g., location acquisition).
    impact: |
      Direct cause of the error reported by user.
      Prevents graceful handling when timing race occurs.
      Should add error handling and state recovery.

  - area: Map widget ready/mounted state tracking
    description: |
      No explicit tracking of whether FlutterMap widget is currently mounted/ready.
      Map control relies on implicit assumption that FlutterMap exists if showMapView == true.
      No guards before calling MapController methods.
    impact: |
      Timing-dependent error when state changes trigger listener before widget rebuild.
      Makes code fragile to order-of-operations issues.
      Solution: Either track explicitly or use deferred operations.

  - area: Listener execution timing documentation
    description: |
      No inline comments explaining why listener can safely use MapController.
      No documentation of the race condition potential.
      Makes it hard for future developers to understand constraints.
    impact: |
      Future refactoring may make error worse or introduce additional timing issues.
      Debugging time increases for someone unfamiliar with Riverpod listener timing.

  - area: Alternative to synchronous listener callback
    description: |
      ref.listen executes synchronously with state change.
      No built-in way to defer listener callback until after build phase.
      Could restructure to use addPostFrameCallback but requires refactor.
    impact: |
      Root architectural issue preventing straightforward solution.
      Solution requires choosing between: (1) defer the map operation, (2) add guards, or (3) refactor listener pattern.

  - area: Test coverage for state-to-widget lifecycle
    description: |
      No identified tests verifying widget lifecycle relative to state listener execution.
      Would need widget tests to catch this type of timing issue.
    impact: |
      Race condition was not caught by testing.
      No safety net to prevent similar issues in future state/listener additions.
