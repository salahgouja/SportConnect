appId: com.sportconnect.sport_connect
---
# ============================================
# Validation: Change Password Validation
# ============================================
# Tests validation on the change password screen
# Covers: empty fields, short password, password mismatch
# ============================================

# Login first
- runFlow: ../common/login-helper.yaml

# Navigate to Profile -> Settings -> Change Password
- tapOn: Profile
- runFlow:
    when:
      visible: "Settings"
    commands:
      - tapOn: "Settings"
- runFlow:
    when:
      visible: "Change Password"
    commands:
      - tapOn: "Change Password"

- assertVisible:
    text: "Change Password|Update Password"

# -----------------------------------------------
# Test 1: Submit with all fields empty
# -----------------------------------------------
- runFlow:
    when:
      visible: "Update Password"
    commands:
      - tapOn:
          text: "Update Password"
          label: Submit with empty password fields
      - extendedWaitUntil:
          visible:
            text: "Password is required|Please enter|required"
          timeout: 5000
      - takeScreenshot: change-password-validation-empty

# -----------------------------------------------
# Test 2: New password too short
# -----------------------------------------------
- runFlow:
    when:
      visible: "Current Password"
    commands:
      - tapOn: "Current Password"
      - inputText: "OldPass@123"

- runFlow:
    when:
      visible: "New Password"
    commands:
      - tapOn: "New Password"
      - inputText: "12345"

- runFlow:
    when:
      visible: "Update Password"
    commands:
      - tapOn:
          text: "Update Password"
          label: Submit with short new password
      - assertVisible: "Password must be at least 6 characters"
      - takeScreenshot: change-password-validation-short

# Clear fields
- runFlow:
    when:
      visible: "New Password"
    commands:
      - tapOn: "New Password"
      - eraseText:
          charactersToErase: 50

# -----------------------------------------------
# Test 3: Confirm password does not match
# -----------------------------------------------
- runFlow:
    when:
      visible: "New Password"
    commands:
      - tapOn: "New Password"
      - inputText: "NewSecure@123"

- runFlow:
    when:
      visible: "Confirm New Password"
    commands:
      - tapOn: "Confirm New Password"
      - inputText: "DifferentPass@456"

- runFlow:
    when:
      visible: "Update Password"
    commands:
      - tapOn:
          text: "Update Password"
          label: Submit with mismatched confirm password
      - assertVisible: "Passwords do not match"
      - takeScreenshot: change-password-validation-mismatch

