appId: com.sportconnect.sport_connect
---
# ============================================
# Profile Journey: View Profile
# ============================================
# Tests the profile screen elements
# Journey: Home -> Profile -> Stats -> Quick Actions
# ============================================

# Login first
- runFlow: ../common/login-helper.yaml

# Step 1: Navigate to Profile tab
- tapOn:
    text: Profile
    label: Switch to Profile tab

# Step 2: Wait for profile screen
- extendedWaitUntil:
    visible:
      text: "My Profile|Profile"
    timeout: 5000

- assertVisible: "My Profile"
- takeScreenshot: profile-screen

# Step 3: Verify profile elements
- runFlow:
    when:
      visible: "Edit Profile"
    commands:
      - assertVisible: "Edit Profile"

# Step 4: Check verification badges
- runFlow:
    when:
      visible: "Verified Info"
    commands:
      - assertVisible: "Verified Info"
      - assertVisible: "Email"

# Step 5: Check ride statistics
- runFlow:
    when:
      visible: "Ride Statistics"
    commands:
      - assertVisible: "Ride Statistics"
      - assertVisible: "Total Rides"
      - assertVisible: "CO₂ Saved"

# Step 6: Check member since info
- runFlow:
    when:
      visible: "Member since"
    commands:
      - assertVisible: "Member since"

# Step 7: Test quick actions
- scrollUntilVisible:
    element: "Settings"
    direction: DOWN
    timeout: 5000

- assertVisible: "My Vehicles"
- assertVisible: "My Rides"
- assertVisible: "Achievements"
- assertVisible: "Notifications"
- assertVisible: "Settings"
- takeScreenshot: profile-quick-actions

# Step 8: Navigate to Achievements
- tapOn:
    text: "Achievements"
    label: Open achievements screen
- extendedWaitUntil:
    visible:
      text: "Achievements|Badges"
    timeout: 5000
- takeScreenshot: profile-achievements
- back:
    label: Return to profile

# Step 9: Navigate to Notifications
- tapOn:
    text: "Notifications"
    label: Open notifications screen
- extendedWaitUntil:
    visible:
      text: "Notifications|No Notifications"
    timeout: 5000
- takeScreenshot: profile-notifications
- back:
    label: Return to profile

- takeScreenshot: view-profile-complete
