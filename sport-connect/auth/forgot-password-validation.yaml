appId: com.sportconnect.sport_connect
---
# ============================================
# Validation: Forgot Password Input Validation
# ============================================
# Tests validation on the forgot password screen
# Covers: empty email, invalid email, nonexistent email
# ============================================

- launchApp:
    clearState: true
    label: Launch SportConnect fresh

# Navigate to forgot password
- extendedWaitUntil:
    visible: "Welcome Back"
    timeout: 10000
- tapOn:
    text: "Forgot Password?"
    label: Open forgot password screen

- assertVisible:
    text: "Reset Password|Forgot Password"

# -----------------------------------------------
# Test 1: Submit with empty email
# -----------------------------------------------
- tapOn:
    text: "Reset Password"
    label: Submit with empty email
- assertVisible: "Please enter your email"
- takeScreenshot: forgot-password-validation-empty

# -----------------------------------------------
# Test 2: Invalid email format
# -----------------------------------------------
- tapOn: "you@example.com"
- inputText: "not-an-email"
- tapOn:
    text: "Reset Password"
    label: Submit with invalid email format
- assertVisible: "Please enter a valid email"
- takeScreenshot: forgot-password-validation-invalid

# Clear field
- tapOn: "you@example.com"
- eraseText:
    charactersToErase: 50

# -----------------------------------------------
# Test 3: Email without TLD
# -----------------------------------------------
- tapOn: "you@example.com"
- inputText: "user@domain"
- tapOn:
    text: "Reset Password"
    label: Submit with email missing TLD
- assertVisible: "Please enter a valid email"
- takeScreenshot: forgot-password-validation-no-tld

# Clear field
- tapOn: "you@example.com"
- eraseText:
    charactersToErase: 50

# -----------------------------------------------
# Test 4: Valid email format (success case)
# -----------------------------------------------
- tapOn: "you@example.com"
- inputText: "testuser@sportconnect.com"
- tapOn:
    text: "Reset Password"
    label: Submit with valid email
- extendedWaitUntil:
    visible:
      text: "Password reset email sent|Check your inbox|No user found|An error occurred"
    timeout: 10000
- takeScreenshot: forgot-password-validation-submitted

