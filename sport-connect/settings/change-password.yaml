appId: com.sportconnect.sport_connect
---
# ============================================
# Settings Journey: Change Password
# ============================================
# Tests the change password flow
# Journey: Settings -> Change Password -> Fill Form -> Update
# ============================================

# Login first
- runFlow: ../common/login-helper.yaml

# Step 1: Navigate to Profile -> Settings
- tapOn: Profile
- scrollUntilVisible:
    element: "Settings"
    direction: DOWN
    timeout: 5000
- tapOn: "Settings"

# Step 2: Scroll to Change Password
- scrollUntilVisible:
    element: "Change Password"
    direction: DOWN
    timeout: 5000

# Step 3: Tap Change Password
- tapOn:
    text: "Change Password"
    label: Open change password

# Step 4: Wait for change password form
- extendedWaitUntil:
    visible:
      text: "Current Password|Change Password"
    timeout: 5000

- takeScreenshot: change-password-screen

# Step 5: Fill form
- tapOn: "Current Password"
- inputText: "Test@12345"

- tapOn: "New Password"
- inputText: "NewTest@12345"

- tapOn: "Confirm New Password"
- inputText: "NewTest@12345"

# Step 6: Tap Update
- tapOn:
    text: "Update"
    label: Submit password change

# Step 7: Verify result
- extendedWaitUntil:
    visible:
      text: "Password updated successfully|Settings|Error"
    timeout: 10000

- takeScreenshot: change-password-complete
